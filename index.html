<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録 - AI自動入力版</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background-color: #f4f1eb; font-family: sans-serif; }
        .map-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; max-width: 600px; margin: 0 auto; background: white; padding: 10px; border-radius: 12px; }
        .pref-tile { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 8px; border-radius: 2px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // あなたのAPIキーを適用済み
        const GEMINI_API_KEY = "AIzaSyAD2GUk4pU1LKvMTcHEFFKMOv4-GPYE_Bg"; 

        const PREFECTURE_MAP = [
            { id: '北海道', name: '北海', x: 15, y: 0 }, { id: '青森県', name: '青森', x: 15, y: 1 },
            { id: '秋田県', name: '秋田', x: 14, y: 2 }, { id: '岩手県', name: '岩手', x: 15, y: 2 },
            { id: '山形県', name: '山形', x: 14, y: 3 }, { id: '宮城県', name: '宮城', x: 15, y: 3 },
            { id: '新潟県', name: '新潟', x: 13, y: 4 }, { id: '福島県', name: '福島', x: 14, y: 4 },
            { id: '石川県', name: '石川', x: 11, y: 5 }, { id: '富山県', name: '富山', x: 12, y: 5 }, { id: '群馬県', name: '群馬', x: 13, y: 5 }, { id: '栃木県', name: '栃木', x: 14, y: 5 }, { id: '茨城県', name: '茨城', x: 15, y: 5 },
            { id: '福井県', name: '福井', x: 10, y: 6 }, { id: '岐阜県', name: '岐阜', x: 11, y: 6 }, { id: '長野県', name: '長野', x: 12, y: 6 }, { id: '埼玉県', name: '埼玉', x: 13, y: 6 }, { id: '千葉県', name: '千葉', x: 14, y: 6 },
            { id: '山口県', name: '山口', x: 3,  y: 7 }, { id: '島根県', name: '島根', x: 4,  y: 7 }, { id: '鳥取県', name: '鳥取', x: 5,  y: 7 }, { id: '兵庫県', name: '兵庫', x: 6,  y: 7 }, { id: '京都府', name: '京都', x: 7,  y: 7 }, { id: '滋賀県', name: '滋賀', x: 8,  y: 7 }, { id: '愛知県', name: '愛知', x: 10, y: 7 }, { id: '山梨県', name: '山梨', x: 11, y: 7 }, { id: '東京都', name: '東京', x: 12, y: 7 },
            { id: '佐賀県', name: '佐賀', x: 1,  y: 8 }, { id: '福岡県', name: '福岡', x: 2,  y: 8 }, { id: '広島県', name: '広島', x: 4,  y: 8 }, { id: '岡山県', name: '岡山', x: 5,  y: 8 }, { id: '大阪府', name: '大阪', x: 6,  y: 8 }, { id: '奈良県', name: '奈良', x: 7,  y: 8 }, { id: '三重県', name: '三重', x: 8,  y: 8 }, { id: '静岡県', name: '静岡', x: 10, y: 8 }, { id: '神奈川県', name: '神奈', x: 12, y: 8 },
            { id: '長崎県', name: '長崎', x: 1,  y: 9 }, { id: '熊本県', name: '熊本', x: 2,  y: 9 }, { id: '大分県', name: '大分', x: 3,  y: 9 }, { id: '和歌山県', name: '和歌', x: 6,  y: 9 },
            { id: '鹿児島県', name: '鹿児', x: 2, y: 10}, { id: '宮崎県', name: '宮崎', x: 3, y: 10}, { id: '香川県', name: '香川', x: 5, y: 10 }, { id: '徳島県', name: '徳島', x: 6, y: 10 },
            { id: '沖縄県', name: '沖縄', x: 0,  y: 11 }, { id: '愛媛県', name: '愛媛', x: 5, y: 11 }, { id: '高知県', name: '高知', x: 6, y: 11 }
        ];

        function App() {
            const [visits, setVisits] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('list');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSearching, setIsSearching] = useState(false);
            const [formData, setFormData] = useState({ name: '', location: '', address: '', rating: 5, notes: '' });

            const firebaseConfig = {
                apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
                authDomain: "otera-meguri.firebaseapp.com",
                projectId: "otera-meguri",
                storageBucket: "otera-meguri.firebasestorage.app",
                appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
            };

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                firebase.auth().signInAnonymously();
                const unsubscribe = db.collection('visits').orderBy('date', 'desc').onSnapshot(snap => {
                    setVisits(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                    setLoading(false);
                }, () => setLoading(false));
                return () => unsubscribe();
            }, []);

            const stats = useMemo(() => {
                const s = {};
                visits.forEach(v => { if(v.location) s[v.location] = true; });
                return s;
            }, [visits]);

            // --- ここが修正ポイント: AIからデータを引き出す処理を強化 ---
            const fetchTempleInfo = async () => {
                if (!formData.name) return;
                setIsSearching(true);
                try {
                    const prompt = `日本の「${formData.name}」について調べて、以下のJSON形式だけで答えてください。
                    {"address": "都道府県からの住所", "pref": "都道府県名", "info": "100文字程度の解説"}
                    ※JSON以外の文字は一切書かないでください。`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await res.json();
                    if (!data.candidates) throw new Error("APIレスポンスエラー");
                    
                    const resultText = data.candidates[0].content.parts[0].text;
                    const json = JSON.parse(resultText.replace(/```json|```/g, "").trim());
                    
                    setFormData(prev => ({
                        ...prev,
                        address: json.address,
                        location: json.pref, // 都道府県を自動セット
                        notes: `【AIによる解説】\n${json.info}\n\n${prev.notes}`
                    }));
                } catch (e) {
                    console.error(e);
                    alert("情報を取得できませんでした。お寺の名前を正しく入力してみてください。");
                } finally {
                    setIsSearching(false);
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                await firebase.firestore().collection('visits').add({ ...formData, date: new Date().toISOString().split('T')[0] });
                setIsModalOpen(false);
                setFormData({ name: '', location: '', address: '', rating: 5, notes: '' });
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-bold">読み込み中...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-20">
                    <header className="bg-[#2c4c3b] text-white p-6 shadow-md flex justify-between items-center">
                        <h1 className="text-xl font-bold">⛩️ 寺社巡礼録</h1>
                        <button onClick={() => setTab(tab === 'list' ? 'map' : 'list')} className="text-xs bg-white/20 px-3 py-1 rounded-full border">
                            {tab === 'list' ? '日本地図' : 'リスト'}
                        </button>
                    </header>

                    <main className="p-4">
                        {tab === 'list' ? (
                            <div className="space-y-4">
                                {visits.map(v => (
                                    <div key={v.id} className="bg-white p-4 rounded-xl shadow-sm border border-stone-200">
                                        <div className="flex justify-between">
                                            <span className="font-bold text-[#2c4c3b]">{v.name}</span>
                                            <span className="text-amber-400">{'★'.repeat(v.rating)}</span>
                                        </div>
                                        <div className="text-[10px] text-stone-500 mt-1">{v.address || v.location}</div>
                                        <p className="text-sm mt-2 text-stone-600 whitespace-pre-wrap">{v.notes}</p>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white p-4 rounded-xl shadow-sm">
                                <p className="text-center mb-6 font-bold text-stone-600">全国制覇: {Object.keys(stats).length} / 47</p>
                                <div className="map-grid">
                                    {PREFECTURE_MAP.map(p => (
                                        <div key={p.id} className={`pref-tile ${stats[p.id] ? 'bg-[#2c4c3b] text-white font-bold' : 'bg-stone-100 text-stone-300'}`} style={{ gridColumn: p.x + 1, gridRow: p.y + 1 }}>
                                            {p.name}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 bg-[#2c4c3b] text-white w-14 h-14 rounded-full shadow-lg text-3xl font-bold">+</button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                            <form onSubmit={handleSave} className="bg-white p-6 rounded-3xl w-full max-w-sm space-y-4">
                                <h2 className="font-bold text-[#2c4c3b]">参拝記録を追加</h2>
                                <div>
                                    <label className="text-xs font-bold text-stone-500">お寺の名前</label>
                                    <div className="flex gap-2 mt-1">
                                        <input className="flex-1 border p-3 rounded-xl text-sm" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required placeholder="例: 田無神社" />
                                        <button type="button" onClick={fetchTempleInfo} className="bg-[#d4af37] text-white px-3 rounded-xl text-xs font-bold shadow-sm">
                                            {isSearching ? <span className="animate-spin">⏳</span> : '✨AI検索'}
                                        </button>
                                    </div>
                                </div>
                                <div className="text-xs bg-stone-50 p-3 rounded-xl border border-dashed">
                                    <p className="font-bold text-[#2c4c3b]">AI自動補完:</p>
                                    <p className="mt-1">📍 住所: {formData.address || '未取得'}</p>
                                    <p>都道府: {formData.location || '未取得'}</p>
                                </div>
                                <textarea className="w-full border p-3 rounded-xl h-24 text-xs" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} placeholder="感想など..." />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-stone-100 p-3 rounded-xl">戻る</button>
                                    <button type="submit" className="flex-1 bg-[#2c4c3b] text-white p-3 rounded-xl font-bold">保存</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
