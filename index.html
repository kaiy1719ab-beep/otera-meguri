<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#f4f1eb]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [visits, setVisits] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [name, setName] = useState('');

            // Firebase設定
            const firebaseConfig = {
                apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
                authDomain: "otera-meguri.firebaseapp.com",
                projectId: "otera-meguri",
                storageBucket: "otera-meguri.firebasestorage.app",
                messagingSenderId: "963990099437",
                appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
            };

            useEffect(() => {
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    const db = firebase.firestore();
                    firebase.auth().signInAnonymously();

                    const unsubscribe = db.collection('visits').onSnapshot(snap => {
                        setVisits(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                        setLoading(false);
                    });
                    return () => unsubscribe();
                } catch (e) {
                    console.error(e);
                    setLoading(false);
                }
            }, []);

            const handleSave = async (e) => {
                e.preventDefault();
                await firebase.firestore().collection('visits').add({
                    name: name,
                    date: new Date().toISOString().split('T')[0]
                });
                setName('');
                setIsModalOpen(false);
            };

            if (loading) return <div className="p-10 text-center font-bold">読み込み中...</div>;

            return (
                <div className="max-w-md mx-auto p-4">
                    <header className="bg-[#2c4c3b] text-white p-4 rounded-t-lg shadow-lg">
                        <h1 className="text-xl font-bold">寺社巡礼録</h1>
                    </header>
                    
                    <div className="bg-white p-4 shadow min-h-[300px]">
                        {visits.length === 0 ? (
                            <p className="text-stone-400 text-center mt-10">記録がまだありません</p>
                        ) : (
                            visits.map(v => (
                                <div key={v.id} className="border-b py-2">
                                    <div className="font-bold text-[#2c4c3b]">{v.name}</div>
                                    <div className="text-xs text-stone-400">{v.date}</div>
                                </div>
                            ))
                        )}
                    </div>

                    <button 
                        onClick={() => setIsModalOpen(true)}
                        className="fixed bottom-10 right-10 bg-[#2c4c3b] text-white w-14 h-14 rounded-full shadow-2xl text-3xl font-bold"
                    >＋</button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-lg w-full max-w-sm">
                                <h2 className="font-bold mb-4">参拝記録を追加</h2>
                                <input 
                                    className="w-full border p-2 mb-4 rounded"
                                    placeholder="寺社名"
                                    value={name}
                                    onChange={e => setName(e.target.value)}
                                />
                                <div className="flex gap-2">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 bg-stone-100 p-2 rounded">戻る</button>
                                    <button onClick={handleSave} className="flex-1 bg-[#2c4c3b] text-white p-2 rounded">保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 古い方式のレンダリング（ブラウザでの安定性が高い）
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
