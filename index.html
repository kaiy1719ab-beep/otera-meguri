<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録 - セキュリティ対策版</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background-color: #f4f1eb; font-family: sans-serif; }
        .map-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; max-width: 600px; margin: 0 auto; background: white; padding: 10px; border-radius: 12px; }
        .pref-tile { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 8px; border-radius: 2px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('my_gemini_key') || '');
            const [visits, setVisits] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSearching, setIsSearching] = useState(false);
            const [formData, setFormData] = useState({ name: '', location: '', address: '', notes: '' });

            const firebaseConfig = {
                apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
                authDomain: "otera-meguri.firebaseapp.com",
                projectId: "plasma-galaxy-495010-v0",
                storageBucket: "otera-meguri.firebasestorage.app",
                appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
            };

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                const unsubscribe = db.collection('visits').orderBy('date', 'desc').onSnapshot(snap => {
                    setVisits(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });
                return () => unsubscribe();
            }, []);

            const stats = useMemo(() => {
                const s = {};
                visits.forEach(v => { if(v.location) s[v.location] = true; });
                return s;
            }, [visits]);

            const fetchTempleInfo = async () => {
                if (!formData.name || !apiKey) { alert("お寺の名前とAPIキーを入力してください"); return; }
                setIsSearching(true);
                try {
                    const prompt = `日本の「${formData.name}」について調べて、住所（都道府県から）、都道府県名、由緒を、住所：、県名：、紹介：という目印を付けて答えて。`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    const text = data.candidates[0].content.parts[0].text;
                    const address = text.split('住所：')[1]?.split('\n')[0] || "";
                    const pref = text.split('県名：')[1]?.split('\n')[0] || "";
                    setFormData(prev => ({ ...prev, address: address.trim(), location: pref.trim(), notes: `【AI情報】\n${text}` }));
                } catch (e) { alert("AI検索に失敗しました。キーが有効か確認してください。"); }
                setIsSearching(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-4">
                    <header className="bg-[#2c4c3b] text-white p-6 rounded-xl mb-4 shadow-lg">
                        <h1 className="text-xl font-bold">⛩️ 寺社巡礼録 - AI版</h1>
                        <div className="mt-4">
                            <label className="text-[10px] text-stone-300 block mb-1">Gemini APIキーを入力（一度入れれば保存されます）</label>
                            <input 
                                type="password" 
                                className="w-full bg-black/20 text-white text-xs p-2 rounded border border-white/20 outline-none"
                                value={apiKey}
                                onChange={(e) => {
                                    setApiKey(e.target.value);
                                    localStorage.setItem('my_gemini_key', e.target.value);
                                }}
                                placeholder="AIza..."
                            />
                        </div>
                    </header>

                    <div className="bg-white p-4 rounded-xl shadow-sm mb-4">
                        <p className="text-center font-bold text-stone-600 mb-4">踏破数: {Object.keys(stats).length} / 47</p>
                        <div className="map-grid">
                            {Array.from({length: 47}).map((_, i) => (
                                <div key={i} className="pref-tile bg-stone-100 text-stone-300">?</div>
                            ))}
                        </div>
                    </div>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 bg-[#2c4c3b] text-white w-14 h-14 rounded-full shadow-lg text-3xl font-bold">+</button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 overflow-y-auto">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm space-y-4">
                                <h2 className="font-bold text-xl text-[#2c4c3b]">参拝記録の作成</h2>
                                <div className="flex gap-2">
                                    <input className="flex-1 border p-3 rounded-xl text-sm" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="お寺の名前" />
                                    <button onClick={fetchTempleInfo} className="bg-[#d4af37] text-white px-3 rounded-xl text-xs font-bold">
                                        {isSearching ? '⏳' : '✨AI検索'}
                                    </button>
                                </div>
                                <div className="text-[10px] bg-stone-50 p-3 rounded-xl border border-dashed">
                                    <p>📍住所: {formData.address || '自動入力待ち'}</p>
                                    <p>🏛️県名: {formData.location || '自動入力待ち'}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 bg-stone-100 p-3 rounded-xl font-bold">戻る</button>
                                    <button className="flex-1 bg-[#2c4c3b] text-white p-3 rounded-xl font-bold">保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
