<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.321.0"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#f4f1eb]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [visits, setVisits] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('list');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', location: '', rating: 5, notes: '', date: new Date().toISOString().split('T')[0] });

            // アイコンを使えるように取得
            const { MapPin, Calendar, Star, BookOpen, Plus, X } = window.lucide;

            // Firebase 設定
            const firebaseConfig = {
                apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
                authDomain: "otera-meguri.firebaseapp.com",
                projectId: "otera-meguri",
                storageBucket: "otera-meguri.firebasestorage.app",
                messagingSenderId: "963990099437",
                appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
            };

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                firebase.auth().signInAnonymously();
                const unsubscribe = db.collection('visits').orderBy('date', 'desc').onSnapshot(snap => {
                    setVisits(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                    setLoading(false);
                }, () => setLoading(false));
                return () => unsubscribe();
            }, []);

            const handleSave = async (e) => {
                e.preventDefault();
                await firebase.firestore().collection('visits').add(formData);
                setFormData({ name: '', location: '', rating: 5, notes: '', date: new Date().toISOString().split('T')[0] });
                setIsModalOpen(false);
            };

            if (loading) return <div className="p-20 text-center font-bold">読み込み中...</div>;

            return (
                <div className="max-w-xl mx-auto min-h-screen pb-20">
                    <header className="bg-[#2c4c3b] text-white p-6 shadow-lg flex justify-between items-center">
                        <div className="flex items-center gap-2"><BookOpen size={24} /> <h1 className="text-xl font-bold">寺社巡礼録</h1></div>
                        <div className="text-xs bg-white/10 px-3 py-1 rounded-full">参拝数: {visits.length}</div>
                    </header>

                    <nav className="flex bg-white border-b sticky top-0 z-10">
                        <button onClick={() => setTab('list')} className={`flex-1 p-4 font-bold ${tab === 'list' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>リスト</button>
                        <button onClick={() => setTab('map')} className={`flex-1 p-4 font-bold ${tab === 'map' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>地図</button>
                    </nav>

                    <main className="p-4">
                        {tab === 'list' ? (
                            <div className="space-y-4">
                                {visits.map(v => (
                                    <div key={v.id} className="bg-white p-5 rounded-2xl shadow-sm border border-stone-200">
                                        <div className="flex justify-between">
                                            <h3 className="font-bold text-[#2c4c3b]">{v.name}</h3>
                                            <div className="text-amber-400 flex">★ {v.rating}</div>
                                        </div>
                                        <p className="text-xs text-stone-400 mt-1">{v.location} | {v.date}</p>
                                        <p className="text-sm mt-3 text-stone-600 italic">"{v.notes}"</p>
                                    </div>
                                ))}
                                {visits.length === 0 && <div className="text-center py-20 text-stone-400">記録がありません</div>}
                            </div>
                        ) : (
                            <div className="bg-white p-10 rounded-2xl text-center shadow">
                                <MapPin size={48} className="mx-auto text-[#2c4c3b] mb-4" />
                                <p className="font-bold">地図機能 準備中</p>
                                <p className="text-sm text-stone-400">参拝リストのデータは保存されています</p>
                            </div>
                        )}
                    </main>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 bg-[#2c4c3b] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-3xl font-bold">＋</button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                            <form onSubmit={handleSave} className="bg-white p-6 rounded-3xl w-full max-w-sm space-y-4">
                                <h2 className="font-bold text-xl text-[#2c4c3b]">参拝記録</h2>
                                <input placeholder="寺社名" className="w-full border p-3 rounded-xl" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required />
                                <input placeholder="場所（例：京都府）" className="w-full border p-3 rounded-xl" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                                <textarea placeholder="感想やメモ" className="w-full border p-3 rounded-xl h-24" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 p-3 bg-stone-100 rounded-xl">戻る</button>
                                    <button type="submit" className="flex-1 p-3 bg-[#2c4c3b] text-white rounded-xl">保存</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // 最も安定した描画方式
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
