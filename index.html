<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#f4f1eb]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [visits, setVisits] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [name, setName] = useState('');

            const firebaseConfig = {
                apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
                authDomain: "otera-meguri.firebaseapp.com",
                projectId: "otera-meguri",
                storageBucket: "otera-meguri.firebasestorage.app",
                messagingSenderId: "963990099437",
                appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
            };

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                firebase.auth().signInAnonymously();

                const unsubscribe = db.collection('visits').onSnapshot(snap => {
                    setVisits(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                    setLoading(false);
                }, () => setLoading(false));
                return () => unsubscribe();
            }, []);

            const handleSave = async (e) => {
                e.preventDefault();
                if (!name) return;
                await firebase.firestore().collection('visits').add({
                    name: name,
                    date: new Date().toISOString().split('T')[0]
                });
                setName('');
                setIsModalOpen(false);
            };

            if (loading) return <div style={{padding: '50px', textAlign: 'center', fontWeight: 'bold'}}>読み込み中...</div>;

            return (
                <div style={{maxWidth: '500px', margin: '0 auto', padding: '20px'}}>
                    <header style={{backgroundColor: '#2c4c3b', color: 'white', padding: '20px', borderRadius: '10px', marginBottom: '20px'}}>
                        <h1 style={{fontSize: '20px', fontWeight: 'bold'}}>⛩️ 寺社巡礼録</h1>
                    </header>

                    <div style={{backgroundColor: 'white', padding: '20px', borderRadius: '10px', minHeight: '200px', boxShadow: '0 2px 5px rgba(0,0,0,0.1)'}}>
                        {visits.length === 0 ? (
                            <p style={{color: '#999', textAlign: 'center', marginTop: '50px'}}>記録がまだありません</p>
                        ) : (
                            visits.map(v => (
                                <div key={v.id} style={{borderBottom: '1px solid #eee', padding: '10px 0'}}>
                                    <div style={{fontWeight: 'bold', color: '#2c4c3b'}}>{v.name}</div>
                                    <div style={{fontSize: '12px', color: '#999'}}>{v.date}</div>
                                </div>
                            ))
                        )}
                    </div>

                    <button 
                        onClick={() => setIsModalOpen(true)}
                        style={{position: 'fixed', bottom: '30px', right: '30px', width: '60px', height: '60px', borderRadius: '50%', backgroundColor: '#2c4c3b', color: 'white', fontSize: '30px', border: 'none', cursor: 'pointer', boxShadow: '0 4px 10px rgba(0,0,0,0.3)'}}
                    >+</button>

                    {isModalOpen && (
                        <div style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px', zIndex: 100}}>
                            <div style={{backgroundColor: 'white', padding: '30px', borderRadius: '15px', width: '100%', maxWidth: '350px'}}>
                                <h2 style={{fontWeight: 'bold', marginBottom: '20px'}}>参拝記録を追加</h2>
                                <input 
                                    style={{width: '100%', padding: '10px', border: '1px solid #ccc', borderRadius: '5px', marginBottom: '20px'}}
                                    placeholder="寺社名を入力"
                                    value={name}
                                    onChange={e => setName(e.target.value)}
                                />
                                <div style={{display: 'flex', gap: '10px'}}>
                                    <button onClick={() => setIsModalOpen(false)} style={{flex: 1, padding: '10px', border: 'none', borderRadius: '5px', backgroundColor: '#eee'}}>戻る</button>
                                    <button onClick={handleSave} style={{flex: 1, padding: '10px', border: 'none', borderRadius: '5px', backgroundColor: '#2c4c3b', color: 'white'}}>保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
