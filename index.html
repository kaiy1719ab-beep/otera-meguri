<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background-color: #f4f1eb; font-family: sans-serif; }
        .pref-grid { display: grid; grid-template-columns: repeat(16, minmax(25px, 1fr)); grid-template-rows: repeat(12, 30px); gap: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { MapPin, Calendar, Star, BookOpen, Plus, X, Loader2, Bot } = window.lucide;

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
            authDomain: "otera-meguri.firebaseapp.com",
            projectId: "otera-meguri",
            storageBucket: "otera-meguri.firebasestorage.app",
            messagingSenderId: "963990099437",
            appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
        };

        // 地図データ
        const PREFECTURE_MAP = [
            { id: '北海道', name: '北海', x: 15, y: 0 }, { id: '青森県', name: '青森', x: 15, y: 1 },
            { id: '岩手県', name: '岩手', x: 15, y: 2 }, { id: '秋田県', name: '秋田', x: 14, y: 2 },
            { id: '宮城県', name: '宮城', x: 15, y: 3 }, { id: '山形県', name: '山形', x: 14, y: 3 },
            { id: '福島県', name: '福島', x: 14, y: 4 }, { id: '茨城県', name: '茨城', x: 15, y: 5 },
            { id: '栃木県', name: '栃木', x: 14, y: 5 }, { id: '群馬県', name: '群馬', x: 13, y: 5 },
            { id: '埼玉県', name: '埼玉', x: 13, y: 6 }, { id: '千葉県', name: '千葉', x: 14, y: 6 },
            { id: '東京都', name: '東京', x: 12, y: 7 }, { id: '神奈川県', name: '神奈', x: 12, y: 8 },
            { id: '新潟県', name: '新潟', x: 13, y: 4 }, { id: '富山県', name: '富山', x: 12, y: 5 },
            { id: '石川県', name: '石川', x: 11, y: 5 }, { id: '福井県', name: '福井', x: 10, y: 6 },
            { id: '山梨県', name: '山梨', x: 11, y: 7 }, { id: '長野県', name: '長野', x: 12, y: 6 },
            { id: '岐阜県', name: '岐阜', x: 11, y: 6 }, { id: '静岡県', name: '静岡', x: 10, y: 8 },
            { id: '愛知県', name: '愛知', x: 10, y: 7 }, { id: '三重県', name: '三重', x: 8, y: 8 },
            { id: '滋賀県', name: '滋賀', x: 8, y: 7 }, { id: '京都府', name: '京都', x: 7, y: 7 },
            { id: '大阪府', name: '大阪', x: 6, y: 8 }, { id: '兵庫県', name: '兵庫', x: 6, y: 7 },
            { id: '奈良県', name: '奈良', x: 7, y: 8 }, { id: '和歌山県', name: '和歌', x: 6, y: 9 },
            { id: '鳥取県', name: '鳥取', x: 5, y: 7 }, { id: '島根県', name: '島根', x: 4, y: 7 },
            { id: '岡山県', name: '岡山', x: 5, y: 8 }, { id: '広島県', name: '広島', x: 4, y: 8 },
            { id: '山口県', name: '山口', x: 3, y: 7 }, { id: '徳島県', name: '徳島', x: 6, y: 10 },
            { id: '香川県', name: '香川', x: 5, y: 10 }, { id: '愛媛県', name: '愛媛', x: 5, y: 11 },
            { id: '高知県', name: '高知', x: 6, y: 11 }, { id: '福岡県', name: '福岡', x: 2, y: 8 },
            { id: '佐賀県', name: '佐賀', x: 1, y: 8 }, { id: '長崎県', name: '長崎', x: 1, y: 9 },
            { id: '熊本県', name: '熊本', x: 2, y: 9 }, { id: '大分県', name: '大分', x: 3, y: 9 },
            { id: '宮崎県', name: '宮崎', x: 3, y: 10 }, { id: '鹿児島県', name: '鹿児', x: 2, y: 10 },
            { id: '沖縄県', name: '沖縄', x: 0, y: 11 }
        ];

        function App() {
            const [visits, setVisits] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('list');
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // 入力用
            const [formData, setFormData] = useState({ name: '', location: '', rating: 5, notes: '', date: new Date().toISOString().split('T')[0] });

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                firebase.auth().signInAnonymously();

                const unsubscribe = db.collection('visits').orderBy('date', 'desc').onSnapshot(snap => {
                    setVisits(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const stats = useMemo(() => {
                const s = {};
                visits.forEach(v => {
                    const found = PREFECTURE_MAP.find(p => v.location?.includes(p.id) || v.location?.includes(p.name));
                    if (found) s[found.id] = (s[found.id] || 0) + 1;
                });
                return s;
            }, [visits]);

            const handleSave = async (e) => {
                e.preventDefault();
                await firebase.firestore().collection('visits').add(formData);
                setFormData({ name: '', location: '', rating: 5, notes: '', date: new Date().toISOString().split('T')[0] });
                setIsModalOpen(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-[#2c4c3b]">読み込み中...</div>;

            return (
                <div className="max-w-xl mx-auto min-h-screen pb-20">
                    <header className="bg-[#2c4c3b] text-white p-6 shadow-lg flex justify-between items-center">
                        <div className="flex items-center gap-2"><BookOpen size={24} className="text-amber-400" /> <h1 className="text-xl font-bold">寺社巡礼録</h1></div>
                        <div className="text-xs bg-white/10 px-3 py-1 rounded-full">参拝数: {visits.length}</div>
                    </header>

                    <nav className="flex bg-white sticky top-0 z-10 border-b">
                        <button onClick={() => setTab('list')} className={`flex-1 p-4 font-bold ${tab === 'list' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>参拝リスト</button>
                        <button onClick={() => setTab('map')} className={`flex-1 p-4 font-bold ${tab === 'map' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>日本地図</button>
                    </nav>

                    <main className="p-4">
                        {tab === 'list' ? (
                            <div className="grid gap-4">
                                {visits.map(v => (
                                    <div key={v.id} className="bg-white p-5 rounded-2xl shadow-sm border border-stone-200">
                                        <div className="flex justify-between items-start">
                                            <h3 className="font-bold text-lg text-[#2c4c3b]">{v.name}</h3>
                                            <div className="flex text-amber-400">
                                                {[...Array(Number(v.rating || 5))].map((_, i) => <Star key={i} size={14} fill="currentColor" />)}
                                            </div>
                                        </div>
                                        <p className="text-xs text-stone-400 flex items-center gap-1 mt-1"><MapPin size={12} /> {v.location} | <Calendar size={12} /> {v.date}</p>
                                        <p className="text-sm mt-3 text-stone-700 bg-stone-50 p-3 rounded-lg italic">"{v.notes}"</p>
                                    </div>
                                ))}
                                {visits.length === 0 && <div className="text-center py-20 text-stone-400">記録がまだありません</div>}
                            </div>
                        ) : (
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-stone-200">
                                <h2 className="text-center font-bold text-[#2c4c3b] mb-6">参拝都道府県: {Object.keys(stats).length} / 47</h2>
                                <div className="pref-grid">
                                    {PREFECTURE_MAP.map(p => (
                                        <div key={p.id} 
                                            className={`border rounded flex items-center justify-center text-[8px] leading-tight ${stats[p.id] ? 'bg-[#2c4c3b] text-white font-bold' : 'bg-stone-50 text-stone-300'}`}
                                            style={{ gridColumn: p.x + 1, gridRow: p.y + 1 }}>
                                            {p.name}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 bg-[#2c4c3b] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-3xl hover:scale-110 transition-transform">＋</button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <form onSubmit={handleSave} className="bg-white p-6 rounded-3xl w-full max-w-sm space-y-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="font-bold text-xl text-[#2c4c3b]">参拝記録</h2>
                                    <button type="button" onClick={() => setIsModalOpen(false)}><X /></button>
                                </div>
                                <input placeholder="寺社名（例：清水寺）" className="w-full border-2 p-3 rounded-xl focus:border-[#2c4c3b] outline-none" 
                                    value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required />
                                <input placeholder="場所（例：京都府）" className="w-full border-2 p-3 rounded-xl focus:border-[#2c4c3b] outline-none" 
                                    value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                                <div className="flex items-center gap-2">
                                    <span className="text-sm font-bold text-stone-500">評価:</span>
                                    {[1,2,3,4,5].map(num => (
                                        <button key={num} type="button" onClick={() => setFormData({...formData, rating: num})}>
                                            <Star size={24} fill={num <= formData.rating ? "#fbbf24" : "none"} className={num <= formData.rating ? "text-amber-400" : "text-stone-300"} />
                                        </button>
                                    ))}
                                </div>
                                <textarea placeholder="感想やメモ" className="w-full border-2 p-3 rounded-xl h-24 focus:border-[#2c4c3b] outline-none" 
                                    value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} />
                                <button type="submit" className="w-full bg-[#2c4c3b] text-white p-4 rounded-xl font-bold text-lg shadow-lg">記録を保存する</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
