<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background-color: #f4f1eb; font-family: sans-serif; }
        .map-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; }
        .pref-tile { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 8px; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 都道府県データ
        const PREFECTURE_MAP = [
            { id: '北海道', name: '北海', x: 15, y: 0 }, { id: '青森県', name: '青森', x: 15, y: 1 },
            { id: '秋田県', name: '秋田', x: 14, y: 2 }, { id: '岩手県', name: '岩手', x: 15, y: 2 },
            { id: '山形県', name: '山形', x: 14, y: 3 }, { id: '宮城県', name: '宮城', x: 15, y: 3 },
            { id: '新潟県', name: '新潟', x: 13, y: 4 }, { id: '福島県', name: '福島', x: 14, y: 4 },
            { id: '石川県', name: '石川', x: 11, y: 5 }, { id: '富山県', name: '富山', x: 12, y: 5 }, { id: '群馬県', name: '群馬', x: 13, y: 5 }, { id: '栃木県', name: '栃木', x: 14, y: 5 }, { id: '茨城県', name: '茨城', x: 15, y: 5 },
            { id: '福井県', name: '福井', x: 10, y: 6 }, { id: '岐阜県', name: '岐阜', x: 11, y: 6 }, { id: '長野県', name: '長野', x: 12, y: 6 }, { id: '埼玉県', name: '埼玉', x: 13, y: 6 }, { id: '千葉県', name: '千葉', x: 14, y: 6 },
            { id: '山口県', name: '山口', x: 3,  y: 7 }, { id: '島根県', name: '島根', x: 4,  y: 7 }, { id: '鳥取県', name: '鳥取', x: 5,  y: 7 }, { id: '兵庫県', name: '兵庫', x: 6,  y: 7 }, { id: '京都府', name: '京都', x: 7,  y: 7 }, { id: '滋賀県', name: '滋賀', x: 8,  y: 7 }, { id: '愛知県', name: '愛知', x: 10, y: 7 }, { id: '山梨県', name: '山梨', x: 11, y: 7 }, { id: '東京都', name: '東京', x: 12, y: 7 },
            { id: '佐賀県', name: '佐賀', x: 1,  y: 8 }, { id: '福岡県', name: '福岡', x: 2,  y: 8 }, { id: '広島県', name: '広島', x: 4,  y: 8 }, { id: '岡山県', name: '岡山', x: 5,  y: 8 }, { id: '大阪府', name: '大阪', x: 6,  y: 8 }, { id: '奈良県', name: '奈良', x: 7,  y: 8 }, { id: '三重県', name: '三重', x: 8,  y: 8 }, { id: '静岡県', name: '静岡', x: 10, y: 8 }, { id: '神奈川県', name: '神奈', x: 12, y: 8 },
            { id: '長崎県', name: '長崎', x: 1,  y: 9 }, { id: '熊本県', name: '熊本', x: 2,  y: 9 }, { id: '大分県', name: '大分', x: 3,  y: 9 }, { id: '和歌山県', name: '和歌', x: 6,  y: 9 },
            { id: '鹿児島県', name: '鹿児', x: 2, y: 10}, { id: '宮崎県', name: '宮崎', x: 3, y: 10}, { id: '香川県', name: '香川', x: 5, y: 10 }, { id: '徳島県', name: '徳島', x: 6, y: 10 },
            { id: '沖縄県', name: '沖縄', x: 0,  y: 11 }, { id: '愛媛県', name: '愛媛', x: 5, y: 11 }, { id: '高知県', name: '高知', x: 6, y: 11 }
        ];

        function App() {
            const [visits, setVisits] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('list');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', location: '', rating: 5, notes: '', image: null });
            
            const firebaseConfig = {
                apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
                authDomain: "otera-meguri.firebaseapp.com",
                projectId: "otera-meguri",
                storageBucket: "otera-meguri.firebasestorage.app",
                appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
            };

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                firebase.auth().signInAnonymously();
                const unsubscribe = db.collection('visits').onSnapshot(snap => {
                    setVisits(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                    setLoading(false);
                }, () => setLoading(false));
                return () => unsubscribe();
            }, []);

            const stats = useMemo(() => {
                const s = {};
                visits.forEach(v => { if(v.location) s[v.location] = true; });
                return s;
            }, [visits]);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFormData({ ...formData, image: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                await firebase.firestore().collection('visits').add({
                    ...formData,
                    date: new Date().toISOString().split('T')[0]
                });
                setIsModalOpen(false);
                setFormData({ name: '', location: '', rating: 5, notes: '', image: null });
            };

            if (loading) return <div className="p-20 text-center font-bold">読み込み中...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-20 relative">
                    <header className="bg-[#2c4c3b] text-white p-6 shadow-md">
                        <h1 className="text-xl font-bold text-center">⛩️ 寺社巡礼録</h1>
                    </header>

                    <nav className="flex bg-white shadow-sm sticky top-0 z-10 border-b">
                        <button onClick={() => setTab('list')} className={`flex-1 p-3 font-bold ${tab === 'list' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>リスト</button>
                        <button onClick={() => setTab('map')} className={`flex-1 p-3 font-bold ${tab === 'map' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>地図</button>
                    </nav>

                    <main className="p-4">
                        {tab === 'list' ? (
                            <div className="space-y-4">
                                {visits.map(v => (
                                    <div key={v.id} className="bg-white p-4 rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                                        {v.image && <img src={v.image} className="w-full h-40 object-cover rounded-lg mb-3" />}
                                        <div className="flex justify-between">
                                            <span className="font-bold text-[#2c4c3b]">{v.name}</span>
                                            <span className="text-amber-400">{'★'.repeat(v.rating)}</span>
                                        </div>
                                        <div className="text-xs text-stone-400">{v.location}</div>
                                        <div className="text-sm mt-2 text-stone-600 italic">"{v.notes}"</div>
                                    </div>
                                ))}
                                {visits.length === 0 && <p className="text-center text-stone-400 pt-10">記録がまだありません</p>}
                            </div>
                        ) : (
                            <div className="bg-white p-4 rounded-xl shadow-sm">
                                <p className="text-center mb-4 font-bold text-stone-600">全国制覇状況: {Object.keys(stats).length} / 47</p>
                                <div className="map-grid">
                                    {PREFECTURE_MAP.map(p => (
                                        <div key={p.id} className={`pref-tile ${stats[p.id] ? 'bg-[#2c4c3b] text-white font-bold' : 'bg-stone-100 text-stone-300'}`} style={{ gridColumn: p.x + 1, gridRow: p.y + 1 }}>
                                            {p.name}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* AIチャットボタン */}
                    <button onClick={() => setIsChatOpen(true)} className="fixed bottom-8 left-8 bg-[#d4af37] text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl">🤖</button>

                    {/* 追加ボタン */}
                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 bg-[#2c4c3b] text-white w-14 h-14 rounded-full shadow-lg text-3xl font-bold">+</button>

                    {/* AIチャット画面（簡易） */}
                    {isChatOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-6 rounded-2xl w-full max-w-sm">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-bold">🤖 コンシェルジュ</h2>
                                    <button onClick={() => setIsChatOpen(false)}>✕</button>
                                </div>
                                <p className="text-sm text-stone-600 mb-4">こんにちは！APIキーを設定すると、ここでお寺の相談ができるようになります。</p>
                                <button onClick={() => setIsChatOpen(false)} className="w-full bg-[#2c4c3b] text-white p-2 rounded-lg">閉じる</button>
                            </div>
                        </div>
                    )}

                    {/* 追加モーダル */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                            <form onSubmit={handleSave} className="bg-white p-6 rounded-2xl w-full max-w-sm space-y-4 overflow-y-auto max-h-[90vh]">
                                <h2 className="font-bold text-[#2c4c3b]">参拝記録を追加</h2>
                                <div className="border-2 border-dashed border-stone-200 rounded-xl p-4 text-center">
                                    {formData.image ? <img src={formData.image} className="h-32 mx-auto rounded-lg mb-2" /> : <p className="text-stone-300 text-sm mb-2">📸 写真を選択</p>}
                                    <input type="file" accept="image/*" onChange={handleImage} className="text-xs w-full" />
                                </div>
                                <input placeholder="寺社名" className="w-full border p-2 rounded" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required />
                                <select className="w-full border p-2 rounded" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} required>
                                    <option value="">都道府県を選択</option>
                                    {PREFECTURE_MAP.map(p => <option key={p.id} value={p.id}>{p.id}</option>)}
                                </select>
                                <div className="flex items-center gap-2">
                                    <span>評価:</span>
                                    {[1,2,3,4,5].map(n => <button key={n} type="button" onClick={() => setFormData({...formData, rating: n})} className={n <= formData.rating ? 'text-amber-400' : 'text-stone-300'}>★</button>)}
                                </div>
                                <textarea placeholder="感想" className="w-full border p-2 rounded h-20" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-stone-100 p-2 rounded">戻る</button>
                                    <button type="submit" className="flex-1 bg-[#2c4c3b] text-white p-2 rounded">保存</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
