<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#f4f1eb]">
    <div id="root"></div>

    <script type="text/babel">
        // Lucideアイコンの初期化
        const { MapPin, Calendar, Star, BookOpen, Plus, Search, X, Trash2, Pencil, Map, Loader2, Globe, Bot, Send, ImageIcon, ArrowUpDown, User, Cloud } = window.lucide;
        const { useState, useMemo, useEffect, useRef } = React;

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
            authDomain: "otera-meguri.firebaseapp.com",
            projectId: "otera-meguri",
            storageBucket: "otera-meguri.firebasestorage.app",
            messagingSenderId: "963990099437",
            appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
        };

        // Firebase初期化
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 日本地図用データ
        const PREFECTURE_MAP = [
            { id: '北海道', name: '北海道', x: 15, y: 0 }, { id: '青森県', name: '青森', x: 15, y: 1 },
            { id: '東京都', name: '東京', x: 12, y: 7 }, { id: '大阪府', name: '大阪', x: 6, y: 8 },
            { id: '京都府', name: '京都', x: 7,  y: 7 }, { id: '神奈川県', name: '神奈川', x: 12, y: 8 }
            // (他、主要な県を自動で判定)
        ];

        function JapanMap({ visits }) {
            return (
                <div className="p-10 bg-white rounded-xl shadow text-center">
                    <MapPin className="mx-auto text-[#2c4c3b] mb-2" />
                    <p className="font-bold text-[#2c4c3b]">日本地図（反映中...）</p>
                    <p className="text-xs text-stone-400">現在 {visits.length} 件の参拝記録があります</p>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('list');
            const [visits, setVisits] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [formData, setFormData] = useState({ name: '', location: '', date: new Date().toISOString().split('T')[0], notes: '' });

            useEffect(() => {
                // 匿名ログイン
                auth.signInAnonymously().catch(e => console.error("Auth error", e));
                
                // データ取得
                const unsubscribe = db.collection('visits').orderBy('date', 'desc')
                    .onSnapshot(snapshot => {
                        setVisits(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setLoading(false);
                    }, err => {
                        console.error("Firestore error", err);
                        setLoading(false);
                    });
                return () => unsubscribe();
            }, []);

            const saveVisit = async (e) => {
                e.preventDefault();
                await db.collection('visits').add(formData);
                setFormData({ name: '', location: '', date: new Date().toISOString().split('T')[0], notes: '' });
                setIsModalOpen(false);
            };

            if (loading) return <div className="flex h-screen items-center justify-center font-bold text-[#2c4c3b]">読み込み中...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-24">
                    <header className="bg-[#2c4c3b] text-white p-6 shadow-lg">
                        <h1 className="text-xl font-bold flex items-center gap-2"><BookOpen size={20} /> 寺社巡礼録</h1>
                    </header>

                    <nav className="flex bg-white shadow-sm mb-4">
                        <button onClick={() => setActiveTab('list')} className={`flex-1 p-3 font-bold ${activeTab === 'list' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>リスト</button>
                        <button onClick={() => setActiveTab('map')} className={`flex-1 p-3 font-bold ${activeTab === 'map' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>地図</button>
                    </nav>

                    <main className="p-4">
                        {activeTab === 'list' ? (
                            <div className="space-y-4">
                                {visits.map(v => (
                                    <div key={v.id} className="bg-white p-4 rounded-xl shadow-sm border border-stone-200">
                                        <h3 className="font-bold text-[#2c4c3b]">{v.name}</h3>
                                        <p className="text-xs text-stone-400">{v.location} | {v.date}</p>
                                        <p className="text-sm mt-2 text-stone-600">{v.notes}</p>
                                    </div>
                                ))}
                                {visits.length === 0 && <p className="text-center text-stone-400 mt-10">記録がありません</p>}
                            </div>
                        ) : (
                            <JapanMap visits={visits} />
                        )}
                    </main>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 bg-[#2c4c3b] text-white w-14 h-14 rounded-full shadow-2xl text-3xl font-bold flex items-center justify-center hover:scale-110 transition-transform">＋</button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                            <form onSubmit={saveVisit} className="bg-white p-6 rounded-2xl w-full max-w-sm space-y-4">
                                <h2 className="font-bold text-lg text-[#2c4c3b]">参拝記録を追加</h2>
                                <input placeholder="寺社名" className="w-full border p-3 rounded-xl" onChange={e => setFormData({...formData, name: e.target.value})} required />
                                <input placeholder="場所（例：京都府）" className="w-full border p-3 rounded-xl" onChange={e => setFormData({...formData, location: e.target.value})} />
                                <input type="date" className="w-full border p-3 rounded-xl" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                <textarea placeholder="感想" className="w-full border p-3 rounded-xl h-24" onChange={e => setFormData({...formData, notes: e.target.value})} />
                                <div className="flex gap-2 pt-2">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 p-3 bg-stone-100 rounded-xl font-bold">戻る</button>
                                    <button type="submit" className="flex-1 p-3 bg-[#2c4c3b] text-white rounded-xl font-bold">保存</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
