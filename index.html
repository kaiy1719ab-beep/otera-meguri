<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寺社巡礼録</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background-color: #f4f1eb; }
        .map-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; max-width: 600px; margin: 0 auto; }
        .pref-tile { aspect-ratio: 1; display: flex; items-center; justify-center; font-size: 8px; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 都道府県の位置データ
        const PREFECTURE_MAP = [
            { id: '北海道', name: '北海', x: 15, y: 0 }, { id: '青森県', name: '青森', x: 15, y: 1 },
            { id: '東京都', name: '東京', x: 12, y: 7 }, { id: '大阪府', name: '大阪', x: 6, y: 8 },
            { id: '京都府', name: '京都', x: 7, y: 7 }, { id: '神奈川県', name: '神奈', x: 12, y: 8 },
            { id: '福岡県', name: '福岡', x: 2, y: 8 }, { id: '沖縄県', name: '沖縄', x: 0, y: 11 }
            // ※簡易版として主要都市のみ。動作確認後、全県追加可能です。
        ];

        function App() {
            const [visits, setVisits] = useState([]);
            const [tab, setTab] = useState('list');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', location: '', rating: 5, notes: '' });

            const firebaseConfig = {
                apiKey: "AIzaSyAD2gBnNr_wR5Q4KTAYKY8AUhCqUTqAf5Y",
                authDomain: "otera-meguri.firebaseapp.com",
                projectId: "otera-meguri",
                storageBucket: "otera-meguri.firebasestorage.app",
                appId: "1:963990099437:web:b68fdf1c04c54d185fc3e4"
            };

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                firebase.auth().signInAnonymously();
                const unsubscribe = db.collection('visits').onSnapshot(snap => {
                    setVisits(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });
                return () => unsubscribe();
            }, []);

            const stats = useMemo(() => {
                const s = {};
                visits.forEach(v => { if(v.location) s[v.location] = true; });
                return s;
            }, [visits]);

            const handleSave = async (e) => {
                e.preventDefault();
                await firebase.firestore().collection('visits').add({
                    ...formData,
                    date: new Date().toISOString().split('T')[0]
                });
                setIsModalOpen(false);
                setFormData({ name: '', location: '', rating: 5, notes: '' });
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-20">
                    <header className="bg-[#2c4c3b] text-white p-6 shadow-md">
                        <h1 className="text-xl font-bold text-center">寺社巡礼録</h1>
                    </header>

                    <div className="flex bg-white shadow-sm">
                        <button onClick={() => setTab('list')} className={`flex-1 p-3 font-bold ${tab === 'list' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>リスト</button>
                        <button onClick={() => setTab('map')} className={`flex-1 p-3 font-bold ${tab === 'map' ? 'text-[#2c4c3b] border-b-4 border-[#2c4c3b]' : 'text-stone-400'}`}>日本地図</button>
                    </div>

                    <main className="p-4">
                        {tab === 'list' ? (
                            <div className="space-y-4">
                                {visits.map(v => (
                                    <div key={v.id} className="bg-white p-4 rounded-xl shadow-sm">
                                        <div className="flex justify-between">
                                            <span className="font-bold text-[#2c4c3b]">{v.name}</span>
                                            <span className="text-amber-400">{'★'.repeat(v.rating)}</span>
                                        </div>
                                        <div className="text-xs text-stone-400">{v.location}</div>
                                        <div className="text-sm mt-2 text-stone-600">{v.notes}</div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white p-4 rounded-xl shadow-sm">
                                <p className="text-center mb-4 font-bold text-stone-600">参拝済み都道府県</p>
                                <div className="map-grid">
                                    {PREFECTURE_MAP.map(p => (
                                        <div key={p.id} className={`pref-tile ${stats[p.id] ? 'bg-[#2c4c3b] text-white' : 'bg-stone-100 text-stone-300'}`} style={{ gridColumn: p.x + 1, gridRow: p.y + 1 }}>
                                            {p.name}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 bg-[#2c4c3b] text-white w-14 h-14 rounded-full shadow-lg text-3xl font-bold">+</button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                            <form onSubmit={handleSave} className="bg-white p-6 rounded-2xl w-full max-w-sm space-y-4">
                                <h2 className="font-bold text-[#2c4c3b]">参拝記録を追加</h2>
                                <input placeholder="寺社名" className="w-full border p-2 rounded" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required />
                                <select className="w-full border p-2 rounded" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})}>
                                    <option value="">都道府県を選択</option>
                                    <option value="東京都">東京都</option>
                                    <option value="京都府">京都府</option>
                                    <option value="大阪府">大阪府</option>
                                </select>
                                <div className="flex items-center gap-2">
                                    <span>評価:</span>
                                    {[1,2,3,4,5].map(n => (
                                        <button key={n} type="button" onClick={() => setFormData({...formData, rating: n})} className={n <= formData.rating ? 'text-amber-400' : 'text-stone-300'}>★</button>
                                    ))}
                                </div>
                                <textarea placeholder="感想" className="w-full border p-2 rounded h-20" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-stone-100 p-2 rounded">戻る</button>
                                    <button type="submit" className="flex-1 bg-[#2c4c3b] text-white p-2 rounded">保存</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
